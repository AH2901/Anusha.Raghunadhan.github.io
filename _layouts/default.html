<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <style>
    :root {
      --primary: #667eea;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      color: #333;
      scroll-behavior: smooth;
    }
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      z-index: 1000;
      border-bottom: 1px solid #eee;
    }
    .nav-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: bold;
      text-decoration: none;
      color: #000;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .hero h1 {
      font-size: 4.5rem;
      margin-bottom: 1rem;
    }
    .highlight { color: #ffd700; }
    .section {
      padding: 100px 5%;
      max-width: 1100px;
      margin: 0 auto;
    }
    h2 {
      text-align: center;
      font-size: 2.8rem;
      margin-bottom: 3rem;
    }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }
    .project-card {
      border: 1px solid #eee;
      padding: 1.8rem;
      border-radius: 16px;
      transition: all 0.3s;
    }
    .project-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .btn {
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      margin: 10px 5px;
    }
    .btn.primary {
      background: var(--primary);
      color: white;
    }
    .btn.primary:hover {
      background: #5a6fd8;
      transform: translateY(-3px);
    }
    footer {
      text-align: center;
      padding: 3rem 5%;
      background: #f8f9fa;
      color: #666;
    }
    .social-links a {
      margin: 0 10px;
      color: #555;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="#" class="logo">{{ site.title | split: " " | first }}</a>
      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  {{ content }}

  <!-- Footer -->
  <footer>
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. Made with Jekyll.</p>
    <div class="social-links">
      {% if site.github_username %}<a href="https://github.com/{{ site.github_username }}" target="_blank">GitHub</a>{% endif %}
      {% if site.linkedin_username %}<a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank">LinkedIn</a>{% endif %}
    </div>
  </footer>

  <script>
    // Smooth scrolling
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        if (this.getAttribute('href') !== '#') {
          e.preventDefault();
          document.querySelector(this.getAttribute('href')).scrollIntoView({
            behavior: 'smooth'
          });
        }
      });
    });
  </script>
</body>
</html>
